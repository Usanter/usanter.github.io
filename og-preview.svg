<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="1092" y1="34" x2="192" y2="624" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFAFA"/>
      <stop offset="0.3" stop-color="#F8B195"/>
      <stop offset="0.8" stop-color="#98DBC6"/>
      <stop offset="1" stop-color="#FCFAFA"/>
    </linearGradient>
    <linearGradient id="glass" x1="260" y1="116" x2="876" y2="528" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.72"/>
      <stop offset="1" stop-color="white" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="blur" x="0" y="0" width="1200" height="630" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <filter id="shadow" x="178" y="90" width="844" height="450" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="14"/>
      <feGaussianBlur stdDeviation="22"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.176471 0 0 0 0 0.188235 0 0 0 0 0.278431 0 0 0 0.12 0"/>
      <feBlend in2="SourceGraphic" mode="normal" result="shape"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#FCFAFA"/>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.6" filter="url(#blur)">
    <circle cx="182" cy="122" r="108" fill="#F8B195"/>
    <circle cx="1040" cy="142" r="116" fill="#C5A3E1"/>
    <circle cx="840" cy="544" r="138" fill="#98DBC6"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="244" y="126" width="712" height="378" rx="34" fill="url(#glass)"/>
    <rect x="244.75" y="126.75" width="710.5" height="376.5" rx="33.25" stroke="white" stroke-opacity="0.52" stroke-width="1.5"/>
  </g>

  <text x="310" y="195" fill="#5B607D" font-family="'Space Mono', monospace" font-size="24" letter-spacing="2.4">:: THOMAS_ROLLAND ::</text>
  <text x="310" y="284" fill="#2D3047" font-family="Manrope, Inter, sans-serif" font-size="74" font-weight="700" letter-spacing="-3.6">Speech AI research</text>
  <text x="310" y="360" fill="#2D3047" font-family="Manrope, Inter, sans-serif" font-size="74" font-weight="700" letter-spacing="-3.6">for difficult data.</text>
  <text x="310" y="424" fill="#5B607D" font-family="Manrope, Inter, sans-serif" font-size="30">ASR, efficient adaptation, synthetic data,</text>
  <text x="310" y="464" fill="#5B607D" font-family="Manrope, Inter, sans-serif" font-size="30">and evaluation for low-resource speech systems.</text>

  <rect x="310" y="520" width="184" height="42" rx="21" fill="white" fill-opacity="0.42"/>
  <text x="332" y="547" fill="#2D3047" font-family="'Space Mono', monospace" font-size="20">usanter.github.io</text>

  <g opacity="0.16">
    <circle cx="1060" cy="494" r="82" stroke="#2D3047" stroke-width="1.5"/>
    <circle cx="1026" cy="462" r="82" stroke="#2D3047" stroke-width="1.5"/>
  </g>
</svg>
